# ================================================================
# Базовые определения сервисов Groove Work (общие для dev и prod).
# Сам по себе файл не запускают:
#   dev  → docker compose up -d        (docker-compose.override.yml
#          накладывается автоматически: порты инфры наружу, приложения
#          за profile "full" — по умолчанию бегут на хосте, см. ./dev.sh)
#   prod → docker compose -f docker-compose.yml -f docker-compose.prod.yml
#          (так зовут scripts/deploy_server.sh и Makefile)
# ================================================================
services:
  db:
    # pgvector/pgvector:pg16 — Postgres 16 + предустановленное расширение
    # vector (нужно для семантического поиска задач). Образ обратно совместим
    # с volume от postgres:16-alpine — формат данных одинаковый.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init_sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Flask-монолит: REST /api/*, Socket.IO, фоновые циклы. Звонками не владеет:
  # ринг-фаза уходит по gRPC в callsvc, события звонков возвращаются через
  # Redis-канал gw2:calls:events (sockets/call_bridge.py).
  app:
    build: ../back
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      PORT: "5000"
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      # Публичный ключ PASETO: access-токены выпускает authsvc, Flask только
      # проверяет подпись.
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      SECRET_KEY: ${SECRET_KEY}
      UPLOAD_FOLDER: /app/uploads
      # Микросервис звонков (Go): ринг-фаза ходит из сокет-хендлеров по gRPC.
      CALLS_GRPC_ADDR: calls:9090
      # AI / ProxyAPI — ключ шифрования API-ключей компаний.
      AI_KEY_ENCRYPTION_KEY: ${AI_KEY_ENCRYPTION_KEY:-}
    volumes:
      - uploads:/app/uploads
    expose:
      - "5000"
    healthcheck:
      # urllib вместо curl — его нет в python:3.12-slim. start_period с запасом:
      # entrypoint сперва гонит миграции Alembic.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # Микросервис звонков (Go, back-go/calls): бизнес-логика звонков, LiveKit
  # (токены/комнаты/вебхуки), REST /api/calls/* (nginx маршрутизирует сюда
  # мимо Flask) и gRPC для Flask-шлюза. События для Socket.IO публикует в
  # Redis-канал gw2:calls:events, который слушает app.
  calls:
    build: ../back-go/calls
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Схему calls/call_participants ведёт Alembic на стороне app
      # (entrypoint.sh → flask db upgrade); healthy app = миграции применены,
      # callsvc не стартует на пустой схеме при первом деплое.
      app:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-dev_livekit_secret_min_32_chars_ok}
      LIVEKIT_URL: http://livekit:7880
      LIVEKIT_CLIENT_URL: ${LIVEKIT_CLIENT_URL:-/livekit}
      HTTP_ADDR: ":8090"
      GRPC_ADDR: ":9090"
    expose:
      - "8090"
      - "9090"
    healthcheck:
      # 127.0.0.1, не localhost: busybox wget идёт на ::1 без фолбэка на
      # IPv4, а fiber слушает только tcp4 → ложный unhealthy.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис авторизации (Go, back-go/auth): /api/auth/* и /api/users/*
  # (nginx маршрутизирует сюда мимо Flask). Выпускает PASETO-токены: приватный
  # ключ только здесь, Flask и calls проверяют по PASETO_PUBLIC_KEY. Пишет
  # аватарки в общий uploads-volume (отдаёт их nginx), брутфорс-щит — в Redis.
  auth:
    build: ../back-go/auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Схему users/roles/companies ведёт Alembic на стороне app
      # (entrypoint.sh → flask db upgrade); healthy app = миграции применены.
      app:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PRIVATE_KEY: ${PASETO_PRIVATE_KEY}
      PASETO_REFRESH_KEY: ${PASETO_REFRESH_KEY}
      UPLOAD_FOLDER: /app/uploads
      HTTP_ADDR: ":8091"
    volumes:
      - uploads:/app/uploads
    expose:
      - "8091"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8091/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Конфиг nginx и хост-порты задают оверлеи: dev — nginx.conf и :8080,
  # prod — nginx.prod.conf, :80/:443 и certbot-volumes.
  nginx:
    build:
      context: ../front
      dockerfile: Dockerfile
    restart: unless-stopped
    # service_healthy, а не started: конфиг nginx резолвит upstream'ы app:5000,
    # calls:8090 и auth:8091 на старте — без живых контейнеров он падает целиком
    # («host not found in upstream»), включая отдачу SPA.
    depends_on:
      app:
        condition: service_healthy
      calls:
        condition: service_healthy
      auth:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads:ro

  # Медиа-сервер звонков LiveKit (SFU). Сигнальный WebSocket :7880 ходит через
  # nginx (/livekit); медиа — UDP-мультиплекс на одном порту 7882 (+ TCP 7881
  # как fallback для сетей, где UDP закрыт). На сервере открыть в firewall:
  # 7881/TCP и 7882/UDP.
  livekit:
    image: livekit/livekit-server:v1.9
    restart: unless-stopped
    ports:
      - "7881:7881"
      - "7882:7882/udp"
    expose:
      - "7880"
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-dev_livekit_secret_min_32_chars_ok}
        webhook:
          api_key: ${LIVEKIT_API_KEY:-devkey}
          urls:
            - http://calls:8090/api/calls/livekit-webhook

volumes:
  pg_data:
  redis_data:
  uploads:
