version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init_sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  app:
    build: ../back
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      FLASK_ENV: production
      PORT: "5000"
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      UPLOAD_FOLDER: /app/uploads
      # WebRTC TURN — для звонков через NAT (если TURN_HOST не задан, используются
      # только публичные STUN-серверы Google и звонки между разными сетями могут
      # не пробиться).
      TURN_HOST: ${TURN_HOST:-}
      TURN_PORT: ${TURN_PORT:-3478}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_REALM: ${TURN_REALM:-grovework}
      TURN_TTL: "3600"
    volumes:
      - uploads:/app/uploads
    expose:
      - "5000"

  nginx:
    build:
      context: ../front
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - uploads:/app/uploads:ro

  # TURN-сервер для WebRTC. Запускается только если задан TURN_SECRET в .env
  # (использовать `docker compose --profile calls up -d` для активации).
  # 3478 — основной порт STUN/TURN; 49152-49200 — диапазон relay (умышленно
  # небольшой, чтобы не открывать на сервере 10k портов; хватает на десятки
  # параллельных звонков). На сервере нужно открыть эти порты в firewall.
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    profiles: ["calls"]
    network_mode: host
    command:
      - -n
      - --realm=${TURN_REALM:-grovework}
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET}
      - --listening-port=${TURN_PORT:-3478}
      - --min-port=49152
      - --max-port=49200
      - --no-tls
      - --no-dtls
      - --no-cli
      - --fingerprint
      - --lt-cred-mech
      - --no-multicast-peers
      - --no-loopback-peers
      - --external-ip=${TURN_HOST}

volumes:
  pg_data:
  redis_data:
  uploads:
