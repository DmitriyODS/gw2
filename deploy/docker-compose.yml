# ================================================================
# Базовые определения сервисов Groove Work (общие для dev и prod).
# Сам по себе файл не запускают:
#   dev  → docker compose up -d        (docker-compose.override.yml
#          накладывается автоматически: порты инфры наружу, приложения
#          за profile "full" — по умолчанию бегут на хосте, см. ./dev.sh)
#   prod → docker compose -f docker-compose.yml -f docker-compose.prod.yml
#          (так зовут scripts/deploy_server.sh и Makefile)
# ================================================================
services:
  db:
    # pgvector/pgvector:pg16 — Postgres 16 + предустановленное расширение
    # vector (нужно для семантического поиска задач). Образ обратно совместим
    # с volume от postgres:16-alpine — формат данных одинаковый.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init_sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Миграции схемы (goose, back-go/migrate): run-once контейнер, бежит ДО
  # старта сервисов. БД с Alembic-историей усыновляется (baseline помечается
  # применённым), свежая получает всю схему из baseline.
  migrate:
    build:
      context: ../back-go
      dockerfile: migrate/Dockerfile
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}

  # Realtime-шлюз (Go, back-go/gateway): WebSocket /ws (комнаты all/user_{id},
  # PASETO-handshake), presence в Redis (+ REST exact /api/messenger/presence),
  # ринг-фаза звонков (WS-команды call:* → gRPC callsvc) и доставка событий
  # всех Redis-каналов gw2:*:events клиентам.
  gateway:
    build:
      context: ../back-go
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      # Микросервис звонков (Go): ринг-фаза ходит из WS-команд по gRPC.
      CALLS_GRPC_ADDR: calls:9090
      HTTP_ADDR: ":8096"
    expose:
      - "8096"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8096/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис звонков (Go, back-go/calls): бизнес-логика звонков, LiveKit
  # (токены/комнаты/вебхуки), REST /api/calls/* и gRPC ринг-фазы (зовёт
  # gateway). Плашка звонка в чате — gRPC msgsvc. События клиентам публикует
  # в Redis-канал gw2:calls:events (слушает gateway).
  calls:
    build:
      context: ../back-go
      dockerfile: calls/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Схема — migrate-контейнер (goose): completed = миграции применены,
      # callsvc не стартует на пустой схеме при первом деплое.
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      # Парный диалог и плашка звонка в чате — gRPC msgsvc.
      MESSENGER_GRPC_ADDR: messenger:9092
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-dev_livekit_secret_min_32_chars_ok}
      LIVEKIT_URL: http://livekit:7880
      LIVEKIT_CLIENT_URL: ${LIVEKIT_CLIENT_URL:-/livekit}
      HTTP_ADDR: ":8090"
      GRPC_ADDR: ":9090"
    expose:
      - "8090"
      - "9090"
    healthcheck:
      # 127.0.0.1, не localhost: busybox wget идёт на ::1 без фолбэка на
      # IPv4, а fiber слушает только tcp4 → ложный unhealthy.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис авторизации (Go, back-go/auth): /api/auth/* и /api/users/*.
  # Выпускает PASETO-токены: приватный ключ только здесь, остальные сервисы
  # проверяют по PASETO_PUBLIC_KEY. Пишет аватарки в общий uploads-volume
  # (отдаёт их nginx), брутфорс-щит — в Redis.
  auth:
    build:
      context: ../back-go
      dockerfile: auth/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Схема — migrate-контейнер (goose): completed = миграции применены.
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PRIVATE_KEY: ${PASETO_PRIVATE_KEY}
      PASETO_REFRESH_KEY: ${PASETO_REFRESH_KEY}
      UPLOAD_FOLDER: /app/uploads
      # Хранилище файлов: local (диск, dev) | s3 (Beget, prod). В prod выставить
      # STORAGE_BACKEND=s3 и S3_* в deploy/.env.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-ru1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      # Письма подтверждения email — через mailsvc (gRPC). Ссылка в письме
      # строится от публичного базового URL приложения.
      MAIL_GRPC_ADDR: mail:9098
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:8080}
      # OAuth-провайдер связки аккаунтов навыка Алисы (эти же креды вписываются
      # в консоль Яндекс.Диалогов). Пусто — эндпоинты /api/auth/oauth/* выключены.
      OAUTH_ALICE_CLIENT_ID: ${OAUTH_ALICE_CLIENT_ID:-}
      OAUTH_ALICE_CLIENT_SECRET: ${OAUTH_ALICE_CLIENT_SECRET:-}
      # Вход через Яндекс ID (креды приложения с oauth.yandex.ru). Пусто —
      # кнопка «Войти с Яндексом» скрыта.
      YANDEX_OAUTH_CLIENT_ID: ${YANDEX_OAUTH_CLIENT_ID:-}
      YANDEX_OAUTH_CLIENT_SECRET: ${YANDEX_OAUTH_CLIENT_SECRET:-}
      HTTP_ADDR: ":8091"
    volumes:
      - uploads:/app/uploads
    expose:
      - "8091"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8091/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис мессенджера (Go, back-go/messenger): REST /api/messenger/*
  # (исключение — exact /api/messenger/presence, он в gateway) и gRPC
  # (плашки звонков для callsvc). Вложения сообщений пишет в общий
  # uploads-volume (отдаёт их nginx). События клиентам публикует в
  # Redis-канал gw2:messenger:events.
  messenger:
    build:
      context: ../back-go
      dockerfile: messenger/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Схема — migrate-контейнер (goose): completed = миграции применены.
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      UPLOAD_FOLDER: /app/uploads
      # Хранилище файлов: local (диск, dev) | s3 (Beget, prod). В prod выставить
      # STORAGE_BACKEND=s3 и S3_* в deploy/.env.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-ru1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      HTTP_ADDR: ":8092"
      GRPC_ADDR: ":9092"
      # ИИ техподдержки dev-чата — gRPC aisvc. Без depends_on на ai (клиент
      # лениво коннектится, fail-open → канированный автоответ).
      AI_GRPC_ADDR: ai:9093
    volumes:
      - uploads:/app/uploads
    expose:
      - "8092"
      - "9092"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8092/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис ИИ (Go, back-go/ai): ключи компаний (Fernet), вызовы
  # ProxyAPI/OpenAI (chat + embeddings), task_embeddings (pgvector), ТВ-факт
  # дня (фоновый цикл + кэш в Redis gw2:ai:tv_fact:*), REST
  # /api/companies/<id>/ai-settings и /api/ai/tv-fact, gRPC для tasksvc.
  # Uploads не нужны.
  ai:
    build:
      context: ../back-go
      dockerfile: ai/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Схема — migrate-контейнер (goose): completed = миграции применены.
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      # Fernet-ключ шифрования API-ключей компаний — теперь только у aisvc.
      AI_KEY_ENCRYPTION_KEY: ${AI_KEY_ENCRYPTION_KEY:-}
      HTTP_ADDR: ":8093"
      GRPC_ADDR: ":9093"
      # gRPC-клиент к tasksvc (инструменты статистики/поиска ИИ-ассистента).
      # Без depends_on на tasks — иначе цикл (tasks зовёт ai для семантики):
      # клиент лениво коннектится, как остальные fail-open gRPC-клиенты.
      TASKS_GRPC_ADDR: tasks:9095
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:8080}
      # Платформенный LLM техподдержки (dev-чат мессенджера, зовёт msgsvc).
      # Пустой ключ — ИИ поддержки выключен (канированный автоответ).
      SUPPORT_AI_API_KEY: ${SUPPORT_AI_API_KEY:-}
      SUPPORT_AI_MODEL: ${SUPPORT_AI_MODEL:-}
    expose:
      - "8093"
      - "9093"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8093/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис питомцев-грувиков (Go, back-go/pets): экономика (XP,
  # кудосы), эволюция, магазин, прогулка/лечение/поглаживание, рейтинг
  # признания. REST /api/pets/*, gRPC-хуки доменных событий tasksvc
  # (юниты/задачи). Единственный исходящий gRPC — portalsvc
  # (fire-and-forget пост-поздравление при эволюции). События клиентам
  # публикует в Redis-канал gw2:pets:events.
  pets:
    build:
      context: ../back-go
      dockerfile: pets/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Схема — migrate-контейнер (goose): completed = миграции применены.
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      HTTP_ADDR: ":8094"
      GRPC_ADDR: ":9094"
    expose:
      - "8094"
      - "9094"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8094/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис задач (Go, back-go/tasks): ядро платформы — задачи, юниты,
  # типы юнитов, этапы, отделы, комментарии, избранное, цвета, статистика
  # с xlsx-экспортом и YouGile-интеграция (личные ключи, импорт/экспорт,
  # вебхук). REST /api/tasks|units|unit-types|departments|stages|stats|
  # yougile. Хуки геймификации — gRPC petsvc, семантический поиск/
  # реиндекс — gRPC aisvc. Сокет-события публикует в Redis-канал
  # gw2:tasks:events (слушает gateway).
  tasks:
    build:
      context: ../back-go
      dockerfile: tasks/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Схема — migrate-контейнер (goose): completed = миграции применены.
      migrate:
        condition: service_completed_successfully
      pets:
        condition: service_healthy
      ai:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      PETS_GRPC_ADDR: pets:9094
      AI_GRPC_ADDR: ai:9093
      HTTP_ADDR: ":8095"
      GRPC_ADDR: ":9095"
    expose:
      - "8095"
      - "9095"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8095/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  push:
    build:
      context: ../back-go
      dockerfile: push/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      # FCM service-account JSON (содержимое ключа). Пусто — сервис работает,
      # но пуши не отправляются (см. back-go/push/internal/fcm).
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      HTTP_ADDR: ":8097"
    expose:
      - "8097"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8097/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис реестров (Go, back-go/registry): HTTP :8099 — настраиваемые
  # таблицы-справочники компаний (структура полей + записи), REST /api/registries.
  # Загруженные файлы/картинки — общий uploads-том. Межсервисных вызовов нет.
  registry:
    build:
      context: ../back-go
      dockerfile: registry/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      UPLOAD_FOLDER: /app/uploads
      # Хранилище файлов: local (диск, dev) | s3 (Beget, prod). В prod выставить
      # STORAGE_BACKEND=s3 и S3_* в deploy/.env.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-ru1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      HTTP_ADDR: ":8099"
    volumes:
      - uploads:/app/uploads
    expose:
      - "8099"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8099/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис календарей (Go, back-go/calendar): HTTP :8100 — настраиваемые
  # календари компаний (структура полей + записи с датой/временем), REST
  # /api/calendars. Загруженные файлы/картинки — общий uploads-том. Межсервисных
  # вызовов нет.
  calendar:
    build:
      context: ../back-go
      dockerfile: calendar/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      UPLOAD_FOLDER: /app/uploads
      # Хранилище файлов: local (диск, dev) | s3 (Beget, prod). В prod выставить
      # STORAGE_BACKEND=s3 и S3_* в deploy/.env.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-ru1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      HTTP_ADDR: ":8100"
    volumes:
      - uploads:/app/uploads
    expose:
      - "8100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8100/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис ежедневников (Go, back-go/diary): HTTP :8101 — личные
  # ежедневники пользователей (заметки-задачи по дням, архив, шаринг), REST
  # /api/diaries. Скоуп по владельцу (не по компании); файлов нет. Межсервисных
  # вызовов нет.
  diary:
    build:
      context: ../back-go
      dockerfile: diary/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      HTTP_ADDR: ":8101"
      # gRPC — голосовые операции навыка Алисы (зовёт alicesvc).
      GRPC_ADDR: ":9101"
    expose:
      - "8101"
      - "9101"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8101/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис заметок (Go, back-go/notes): HTTP :8103 — личные заметки
  # пользователей (rich-текст TipTap, группы, публичные ссылки view/edit,
  # экспорт/импорт txt), REST /api/notes. Скоуп по владельцу (не по компании);
  # картинки редактора — общий uploads-том. Межсервисных вызовов нет.
  notes:
    build:
      context: ../back-go
      dockerfile: notes/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ai:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      # ИИ-поиск заметок: векторизация запросов/заметок через aisvc.Embed.
      # Пусто/убрать → семантика выключена, поиск текстовый (fail-open).
      AI_GRPC_ADDR: ai:9093
      UPLOAD_FOLDER: /app/uploads
      # Хранилище файлов: local (диск, dev) | s3 (Beget, prod). В prod выставить
      # STORAGE_BACKEND=s3 и S3_* в deploy/.env.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-ru1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      HTTP_ADDR: ":8103"
      # gRPC — голосовые операции навыка Алисы (зовёт alicesvc).
      GRPC_ADDR: ":9103"
    volumes:
      - uploads:/app/uploads
    expose:
      - "8103"
      - "9103"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8103/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис корпоративного портала (Go, back-go/portal): HTTP :8102 —
  # посты компании (с вложениями), плоские комментарии, реакции, закрепление
  # (лимит 10 на компанию, автоистечение pinned_until), тематические разделы.
  # REST /api/portal. Исходящий межсервисный вызов — пересылка поста в
  # мессенджер (gRPC msgsvc CreatePostMessage).
  portal:
    build:
      context: ../back-go
      dockerfile: portal/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      messenger:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      UPLOAD_FOLDER: /app/uploads
      # Хранилище файлов: local (диск, dev) | s3 (Beget, prod). В prod выставить
      # STORAGE_BACKEND=s3 и S3_* в deploy/.env.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-ru1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      MESSENGER_GRPC_ADDR: messenger:9092
      HTTP_ADDR: ":8102"
    volumes:
      - uploads:/app/uploads
    expose:
      - "8102"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8102/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис навыка Алисы (Go, back-go/alice): HTTP :8104 — публичный
  # вебхук Яндекс.Диалогов (/api/alice/webhook). Своего состояния нет (ни БД,
  # ни Redis): авторизация — PASETO из связки аккаунтов, мультиход диалога —
  # в session_state Диалогов. Голосовые команды исполняются gRPC-вызовами
  # tasksvc/diarysvc/notesvc; разбор фраз — ИИ через aisvc (фолбэк — регэкспы).
  alice:
    build:
      context: ../back-go
      dockerfile: alice/Dockerfile
    restart: unless-stopped
    depends_on:
      tasks:
        condition: service_healthy
      diary:
        condition: service_healthy
      notes:
        condition: service_healthy
      ai:
        condition: service_healthy
    environment:
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      TASKS_GRPC_ADDR: tasks:9095
      DIARY_GRPC_ADDR: diary:9101
      NOTES_GRPC_ADDR: notes:9103
      # ИИ-разбор голосовых фраз ключом активной компании. Явно пусто —
      # только классический регэксп-парсер.
      AI_GRPC_ADDR: ai:9093
      HTTP_ADDR: ":8104"
    expose:
      - "8104"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8104/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Микросервис рассылки писем (Go, back-go/mail): gRPC :9098 — Send(шаблон),
  # HTTP :8098 — /healthz. Stateless (без БД/Redis), доставка по SMTP. Зовёт его
  # authsvc (письма подтверждения email). SMTP_* и отправитель задаёт .env /
  # прод-оверлей; без рабочего SMTP сервис стартует, но письма не уходят.
  mail:
    build:
      context: ../back-go
      dockerfile: mail/Dockerfile
    restart: unless-stopped
    environment:
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@grovework.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Groove Work}
      SMTP_TLS: ${SMTP_TLS:-starttls}
      HTTP_ADDR: ":8098"
      GRPC_ADDR: ":9098"
    expose:
      - "8098"
      - "9098"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8098/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Конфиг nginx и хост-порты задают оверлеи: dev — nginx.conf и :8080,
  # prod — nginx.prod.conf, :80/:443 и certbot-volumes.
  nginx:
    build:
      context: ../front
      dockerfile: Dockerfile
    restart: unless-stopped
    # service_healthy, а не started: конфиг nginx резолвит upstream'ы
    # gateway:8096, calls:8090, auth:8091, messenger:8092, ai:8093,
    # pets:8094, tasks:8095, push:8097, registry:8099, calendar:8100,
    # diary:8101, portal:8102 и notes:8103 на старте — без живых контейнеров
    # он падает целиком («host not found in upstream»), включая отдачу SPA.
    depends_on:
      gateway:
        condition: service_healthy
      calls:
        condition: service_healthy
      auth:
        condition: service_healthy
      messenger:
        condition: service_healthy
      ai:
        condition: service_healthy
      pets:
        condition: service_healthy
      tasks:
        condition: service_healthy
      push:
        condition: service_healthy
      registry:
        condition: service_healthy
      calendar:
        condition: service_healthy
      diary:
        condition: service_healthy
      portal:
        condition: service_healthy
      notes:
        condition: service_healthy
      alice:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads:ro
      # Лог изменений отдаётся статикой (location = /api/changelog);
      # файл приезжает из git-репозитория, отдельного API больше нет.
      # Монтируем КАТАЛОГ, а не один файл: git reset --hard заменяет файл
      # (новый inode), а bind-mount одиночного файла залипает на старом inode —
      # nginx отдавал бы прежний changelog до пересоздания контейнера. С
      # каталогом файл резолвится по имени на каждый запрос — правки видны сразу.
      - ../data:/srv/data:ro
      # Мобильное приложение: APK + version.json (location /apps/). APK кладёт
      # `make deploy-apk` (scp), version.json приезжает с git-репозиторием.
      - ../apps:/srv/apps:ro

  # Медиа-сервер звонков LiveKit (SFU). Сигнальный WebSocket :7880 ходит через
  # nginx (/livekit); медиа — UDP-мультиплекс на одном порту 7882 (+ TCP 7881
  # как fallback для сетей, где UDP закрыт). На сервере открыть в firewall:
  # 7881/TCP и 7882/UDP.
  livekit:
    image: livekit/livekit-server:v1.9
    restart: unless-stopped
    ports:
      - "7881:7881"
      - "7882:7882/udp"
    expose:
      - "7880"
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-dev_livekit_secret_min_32_chars_ok}
        webhook:
          api_key: ${LIVEKIT_API_KEY:-devkey}
          urls:
            - http://calls:8090/api/calls/livekit-webhook

volumes:
  pg_data:
  redis_data:
  uploads:
