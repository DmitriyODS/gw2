# ================================================================
# Dev-оверлей (накладывается на docker-compose.yml автоматически).
#
# Обычная разработка — приложения на хосте, в Docker только инфра:
#   docker compose up -d          # db + redis + livekit (см. ./dev.sh)
# Полный стек в контейнерах (прод-подобная проверка):
#   docker compose --profile full up -d --build
#   фронт: http://localhost:8080
# ================================================================
services:
  db:
    ports:
      - "5432:5432"
  redis:
    ports:
      - "6379:6379"

  # Приложения за профилем full: голый `docker compose up` их не стартует —
  # Flask (:5001), callsvc (:8090/:9090), authsvc (:8091), msgsvc (:8092/:9092),
  # aisvc (:8093/:9093) и Vite (:5173) бегут на хосте. Dev-ключи PASETO — та же
  # пара, что в dev.sh/Makefile.
  app:
    profiles: ["full"]
    environment:
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY:-15ef439747fcad6ca627310942ba14b48f164fcbb5f65c10f61ca2aeb4b53fe1}
  calls:
    profiles: ["full"]
    environment:
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY:-15ef439747fcad6ca627310942ba14b48f164fcbb5f65c10f61ca2aeb4b53fe1}
  messenger:
    profiles: ["full"]
    environment:
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY:-15ef439747fcad6ca627310942ba14b48f164fcbb5f65c10f61ca2aeb4b53fe1}
  ai:
    profiles: ["full"]
    environment:
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY:-15ef439747fcad6ca627310942ba14b48f164fcbb5f65c10f61ca2aeb4b53fe1}
      # Dev-ключ Fernet — тот же, что в back/.flaskenv и dev.sh.
      AI_KEY_ENCRYPTION_KEY: ${AI_KEY_ENCRYPTION_KEY:-X3hFOVZ6XbAzlaygv2PfLbnmBIaH373CK8MqrrAhr8k=}
  groove:
    profiles: ["full"]
    environment:
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY:-15ef439747fcad6ca627310942ba14b48f164fcbb5f65c10f61ca2aeb4b53fe1}
  tasks:
    profiles: ["full"]
    environment:
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY:-15ef439747fcad6ca627310942ba14b48f164fcbb5f65c10f61ca2aeb4b53fe1}
      # Dev-ключ Fernet YouGile — тот же, что в dev.sh/Makefile.
      YOUGILE_ENC_KEY: ${YOUGILE_ENC_KEY:-CT5VF1jg6uFFbj4W_6RW3z3416bPlfbxdMYelrEOIXc=}
  auth:
    profiles: ["full"]
    environment:
      PASETO_PRIVATE_KEY: ${PASETO_PRIVATE_KEY:-68eb779b2f672beb8fcd58d72a81ce1565a1417aed3788d1362bf4faaa3f62ac15ef439747fcad6ca627310942ba14b48f164fcbb5f65c10f61ca2aeb4b53fe1}
      PASETO_REFRESH_KEY: ${PASETO_REFRESH_KEY:-d525374c4ec7b5e1c5b140fb9c1f4cffd9c3dbf052bb18f2f32bf9f92d9fa05c}
  nginx:
    profiles: ["full"]
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

  # Dev-LiveKit: сигнальный порт наружу (браузер ходит на ws://localhost:7880
  # напрямую, без nginx). Вебхуки шлются на ОБА адреса callsvc — на хосте
  # (./dev.sh) и в контейнере (--profile full); недоступный адрес LiveKit
  # просто логирует и пропускает.
  livekit:
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: false
        keys:
          devkey: dev_livekit_secret_min_32_chars_ok
        webhook:
          api_key: devkey
          urls:
            - http://host.docker.internal:8090/api/calls/livekit-webhook
            - http://calls:8090/api/calls/livekit-webhook
