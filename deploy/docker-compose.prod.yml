# ================================================================
# Прод-оверлей. Запуск ТОЛЬКО парой с базовым файлом:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# (так зовут scripts/deploy_server.sh и Makefile; голый `docker compose`
# на сервере не использовать — он подхватит dev-оверлей с портами наружу).
#
# Здесь только отличия от базы: обязательные секреты, TLS/certbot,
# прод-конфиг nginx, YouGile-окружение app.
# ================================================================
services:
  app:
    environment:
      # YouGile-интеграция:
      #   YOUGILE_ENC_KEY — Fernet для шифрования персональных ключей юзеров.
      #     Без него вся /api/yougile/* отдаст 500 ENC_KEY_MISCONFIGURED.
      #   YOUGILE_WEBHOOK_PUBLIC_BASE — публичный URL приложения
      #     (https://gw.example.com). Без него регистрация webhook'а упадёт,
      #     импорт/экспорт продолжают работать.
      YOUGILE_ENC_KEY: ${YOUGILE_ENC_KEY:-}
      YOUGILE_WEBHOOK_PUBLIC_BASE: ${YOUGILE_WEBHOOK_PUBLIC_BASE:-}
    volumes:
      - /opt/gw2/backup.json:/app/backup.json:ro

  calls:
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY обязателен}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET обязателен}

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: always

  livekit:
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY:?}: ${LIVEKIT_API_SECRET:?}
        webhook:
          api_key: ${LIVEKIT_API_KEY:?}
          urls:
            - http://calls:8090/api/calls/livekit-webhook

volumes:
  certbot-conf:
    external: true
    name: gw1_certbot-conf
  certbot-www:
    external: true
    name: gw1_certbot-www
