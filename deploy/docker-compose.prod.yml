# ================================================================
# Прод-оверлей. Запуск ТОЛЬКО парой с базовым файлом:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# (так зовут scripts/deploy_server.sh и Makefile; голый `docker compose`
# на сервере не использовать — он подхватит dev-оверлей с портами наружу).
#
# Здесь только отличия от базы: образы из Docker Hub вместо локальной
# сборки, обязательные секреты, TLS/certbot, прод-конфиг nginx,
# YouGile-окружение tasks.
#
# Прод НЕ собирает образы: их пушит локальная машина (`make push` →
# scripts/build_push.sh) в один репозиторий osipovskijdima/groove_work
# под тегами migrate/gateway/calls/auth/messenger/ai/groove/tasks/front.
# Деплой-скрипт делает `compose pull` + `up --no-build`. Откат: в deploy/.env
# выставить версионный тег, например GATEWAY_TAG=gateway-3.7.0 (MIGRATE_TAG /
# CALLS_TAG / AUTH_TAG / MESSENGER_TAG / AI_TAG / GROOVE_TAG / TASKS_TAG /
# PUSH_TAG / REGISTRY_TAG / MAIL_TAG / FRONT_TAG — аналогично).
# ================================================================
services:
  migrate:
    image: osipovskijdima/groove_work:${MIGRATE_TAG:-migrate}

  gateway:
    image: osipovskijdima/groove_work:${GATEWAY_TAG:-gateway}

  calls:
    image: osipovskijdima/groove_work:${CALLS_TAG:-calls}
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY обязателен}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET обязателен}

  auth:
    image: osipovskijdima/groove_work:${AUTH_TAG:-auth}
    environment:
      # Публичный базовый URL приложения — ссылки подтверждения email в письмах
      # (https://gw.example.com → .../verify-email?token=...).
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-https://gw.kodass.ru}

  messenger:
    image: osipovskijdima/groove_work:${MESSENGER_TAG:-messenger}

  ai:
    image: osipovskijdima/groove_work:${AI_TAG:-ai}

  groove:
    image: osipovskijdima/groove_work:${GROOVE_TAG:-groove}

  tasks:
    image: osipovskijdima/groove_work:${TASKS_TAG:-tasks}
    environment:
      # YouGile-интеграция:
      #   YOUGILE_ENC_KEY — Fernet для шифрования персональных ключей юзеров.
      #     Без него вся /api/yougile/* отдаст 500 ENC_KEY_MISCONFIGURED.
      #   YOUGILE_WEBHOOK_PUBLIC_BASE — публичный URL приложения
      #     (https://gw.example.com). Без него регистрация webhook'а упадёт,
      #     импорт/экспорт продолжают работать.
      YOUGILE_ENC_KEY: ${YOUGILE_ENC_KEY:-}
      YOUGILE_WEBHOOK_PUBLIC_BASE: ${YOUGILE_WEBHOOK_PUBLIC_BASE:-}

  push:
    image: osipovskijdima/groove_work:${PUSH_TAG:-push}
    environment:
      # FCM service-account JSON (содержимое ключа Firebase). Без него pushsvc
      # работает, но пуши не отправляются.
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}

  registry:
    image: osipovskijdima/groove_work:${REGISTRY_TAG:-registry}

  mail:
    image: osipovskijdima/groove_work:${MAIL_TAG:-mail}
    environment:
      # SMTP-параметры отправителя писем (см. deploy/.env). HOST/PORT/FROM
      # обязательны; USER/PASSWORD опциональны (для серверов без авторизации),
      # TLS: starttls (587) | tls (465) | none.
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST обязателен}
      SMTP_PORT: ${SMTP_PORT:?SMTP_PORT обязателен}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM обязателен}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Groove Work}
      SMTP_TLS: ${SMTP_TLS:-starttls}

  nginx:
    image: osipovskijdima/groove_work:${FRONT_TAG:-front}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: always

  # Встроенный в LiveKit TURN-relay — для звонков с «тяжёлых» сетей
  # (мобильный CGNAT/симметричный NAT, VPN, корпоративные фаерволы), где
  # прямой UDP 7882 / TCP 7881 наружу закрыт. TLS на 5349 (cert тот же
  # Let's Encrypt, что у nginx, read-only) + UDP 3478. LiveKit сам анонсирует
  # TURN клиентам с эфемерными кредами — правок в callsvc/фронте/Android не
  # нужно. Relay внутренний (терминируется в SFU), отдельный диапазон
  # relay-портов не требуется — достаточно слушающих 5349/tcp и 3478/udp
  # (deploy_server.sh открывает их в ufw). cert обновляет certbot; LiveKit
  # читает его при старте, поэтому после `certbot renew` нужен рестарт
  # контейнера (происходит на каждом деплое; окно продления Let's Encrypt
  # 30 дней покрывает обычную частоту выкатов).
  livekit:
    ports:
      - "5349:5349"
      - "3478:3478/udp"
    volumes:
      - certbot-conf:/etc/letsencrypt:ro
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        turn:
          enabled: true
          domain: ${LIVEKIT_TURN_DOMAIN:-gw.kodass.ru}
          tls_port: 5349
          udp_port: 3478
          cert_file: /etc/letsencrypt/live/${LIVEKIT_TURN_DOMAIN:-gw.kodass.ru}/fullchain.pem
          key_file: /etc/letsencrypt/live/${LIVEKIT_TURN_DOMAIN:-gw.kodass.ru}/privkey.pem
        keys:
          ${LIVEKIT_API_KEY:?}: ${LIVEKIT_API_SECRET:?}
        webhook:
          api_key: ${LIVEKIT_API_KEY:?}
          urls:
            - http://calls:8090/api/calls/livekit-webhook

volumes:
  certbot-conf:
    external: true
    name: gw1_certbot-conf
  certbot-www:
    external: true
    name: gw1_certbot-www
