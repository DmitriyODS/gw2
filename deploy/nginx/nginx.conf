server {
    listen 80;
    client_max_body_size 10M;

    # Vue SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Звонки — Go-микросервис callsvc (более длинный префикс выигрывает у /api/)
    location /api/calls/ {
        proxy_pass http://calls:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Авторизация и пользователи — Go-микросервис authsvc.
    # Префиксы без хвостового слэша: /api/users (список/создание) тоже наш.
    location /api/auth {
        proxy_pass http://auth:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /api/users {
        proxy_pass http://auth:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Flask REST API
    location /api/ {
        proxy_pass http://app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Swagger UI
    location /apidocs/ {
        proxy_pass http://app:5000;
        proxy_set_header Host $host;
    }

    location /apispec.json {
        proxy_pass http://app:5000;
    }

    location /flasgger_static/ {
        proxy_pass http://app:5000;
    }

    # Socket.IO (WebSocket upgrade)
    location /socket.io/ {
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # LiveKit — сигнальный WebSocket медиа-сервера звонков.
    location /livekit/ {
        proxy_pass http://livekit:7880/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Аватарки и загрузки
    location /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
