server {
    listen 80;
    server_name gw.kodass.ru;
    client_max_body_size 10M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name gw.kodass.ru;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/gw.kodass.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gw.kodass.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # PWA-манифест: базовый mime.types nginx не знает .webmanifest — задаём тип явно.
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        default_type application/manifest+json;
    }

    # Vue SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Android App Links: подтверждение домена для deep links приложения
    # (verify-email/reset-password/invite). Отдаётся по HTTPS без редиректа —
    # верификатор Android не следует за 301. Отпечаток релизной подписи.
    location = /.well-known/assetlinks.json {
        alias /srv/data/assetlinks.json;
        default_type application/json;
    }

    # Звонки — Go-микросервис callsvc (более длинный префикс выигрывает у /api/)
    location /api/calls/ {
        proxy_pass http://calls:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Авторизация и пользователи — Go-микросервис authsvc.
    # Префиксы без хвостового слэша: /api/users (список/создание) тоже наш.
    location /api/auth {
        proxy_pass http://auth:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/users {
        proxy_pass http://auth:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Presence — домен realtime-шлюза gatewaysvc (состояние в Redis).
    # Exact-match всегда выигрывает у префикса /api/messenger ниже.
    location = /api/messenger/presence {
        proxy_pass http://gateway:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Мессенджер — Go-микросервис msgsvc. Префикс без хвостового слэша.
    # 30M (выше глобальных 10M): вложения сообщений до 25 МБ + запас
    # на multipart-обвязку.
    location /api/messenger {
        client_max_body_size 30M;
        proxy_pass http://messenger:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # «Мой Groove» — Go-микросервис groovesvc. Префикс без хвостового слэша.
    location /api/groove {
        proxy_pass http://groove:8094;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Пуш-уведомления — Go-микросервис pushsvc (регистрация токенов устройств).
    location /api/push {
        proxy_pass http://push:8097;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Реестры — Go-микросервис registrysvc. Префикс без хвостового слэша.
    # Загрузка файлов/картинок записей — до 25 МБ.
    location /api/registries {
        client_max_body_size 26M;
        proxy_pass http://registry:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Календари — Go-микросервис calendarsvc. Префикс без хвостового слэша.
    # Загрузка файлов/картинок записей — до 25 МБ.
    location /api/calendars {
        client_max_body_size 26M;
        proxy_pass http://calendar:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Ядро задач — Go-микросервис tasksvc (задачи, юниты, типы, этапы,
    # отделы, статистика). Префиксы без хвостового слэша.
    location /api/tasks {
        proxy_pass http://tasks:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/units {
        proxy_pass http://tasks:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/unit-types {
        proxy_pass http://tasks:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/departments {
        proxy_pass http://tasks:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/stages {
        proxy_pass http://tasks:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/stats {
        proxy_pass http://tasks:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # YouGile-интеграция — тоже tasksvc (вебхук
    # POST /api/yougile/webhook/<companyId>/<secret> публичный, без токена).
    location /api/yougile {
        proxy_pass http://tasks:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ТВ-факт дня — Go-микросервис aisvc (/api/ai/tv-fact).
    location /api/ai {
        proxy_pass http://ai:8093;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ИИ-настройки компаний — Go-микросервис aisvc. Regex-location: только
    # /api/companies/<id>/ai-settings* уходит в aisvc, остальные
    # /api/companies/* идут в authsvc (префикс ниже). Regex выигрывает у
    # префиксного location независимо от порядка в файле; proxy_pass без
    # URI-части — с regex иначе нельзя.
    location ~ ^/api/companies/[0-9]+/ai-settings {
        proxy_pass http://ai:8093;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Компании, роли и резервная копия — Go-микросервис authsvc.
    location /api/companies {
        proxy_pass http://auth:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/roles {
        proxy_pass http://auth:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/backup {
        proxy_pass http://auth:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Лог изменений — статика из репозитория (bind-mount в compose);
    # авторизация не нужна: содержимое и так показывается всем пользователям.
    location = /api/changelog {
        alias /srv/data/changelog.json;
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # Все API-пути обслуживают Go-микросервисы (location'ы выше);
    # незнакомый /api/* — честный 404, а не index.html SPA.
    location /api/ {
        default_type application/json;
        return 404 '{"error": "NOT_FOUND"}';
    }

    # Realtime-шлюз gatewaysvc (WebSocket upgrade)
    location /ws {
        proxy_pass http://gateway:8096;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # LiveKit — сигнальный WebSocket медиа-сервера звонков.
    # Клиент подключается на wss://host/livekit (SDK сам добавляет /rtc),
    # префикс /livekit/ срезается слэшем в proxy_pass.
    location /livekit/ {
        proxy_pass http://livekit:7880/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Аватарки и загрузки — прокси на публично-читаемый S3-бакет Beget
    # (контент хранит pkg/storage в режиме STORAGE_BACKEND=s3). Контракт
    # /uploads/<key> сохранён: /uploads/registry/abc.jpg → объект registry/abc.jpg.
    # Бакету выставлен анонимный s3:GetObject (read-only); см. DEPLOY.md.
    location /uploads/ {
        proxy_pass https://s3.ru1.storage.beget.cloud/a8c637b57548-gws3/;
        proxy_set_header Host s3.ru1.storage.beget.cloud;
        proxy_ssl_server_name on;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header Set-Cookie;
        proxy_intercept_errors on;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Мобильное приложение: APK и version.json с номером сборки — статика из
    # каталога apps/ репозитория (bind-mount в compose). Без кэша, чтобы
    # проверка обновлений сразу видела свежий номер сборки и свежий APK.
    location /apps/ {
        alias /srv/apps/;
        add_header Cache-Control "no-cache";
    }
}
