syntax = "proto3";

// Контракт портала: petsvc → portalsvc (системные celebrating-посты,
// например «питомец эволюционировал»). Транспорт всегда OK; бизнес-ошибка —
// в поле error (по образцу остальных сервисов платформы).
package portal.v1;

option go_package = "github.com/DmitriyODS/gw2/back-go/pkg/gen/portalpb;portalpb";

service PortalService {
  // Системный пост от имени пользователя (для pet_evolved — владелец
  // питомца). Дедуп: повторный вызов с тем же (company_id, system_kind,
  // author_user_id) в течение 10 минут возвращает уже созданный пост
  // (защита от ретраев хука).
  rpc CreateSystemPost(CreateSystemPostRequest) returns (CreateSystemPostResponse);
}

message Error {
  string code = 1;
  string message = 2;
  int32 http_status = 3;
}

message CreateSystemPostRequest {
  int64 company_id = 1;
  // От чьего имени публикуется пост (author поста в ленте).
  int64 author_user_id = 2;
  // Тип системного поста: 'pet_evolved' и будущие. Обязателен.
  string system_kind = 3;
  string title = 4;
  string body = 5;
}

message CreateSystemPostResponse {
  Error error = 1;
  int64 post_id = 2;
}
