// Исходящий gRPC-контракт tasksvc для ИИ-ассистента (aisvc): статистика
// компании и поиск/ссылки на задачи. tasksvc — единственный владелец этих
// данных, aisvc больше не читает его таблицы напрямую (было архитектурным
// долгом старого groove-tools.go). Транспорт всегда OK; бизнес-ошибка —
// в поле error (см. Error).
syntax = "proto3";

package tasks.v1;

option go_package = "github.com/DmitriyODS/gw2/back-go/pkg/gen/taskspb;taskspb";

service TasksService {
  rpc GetStatsSummary(GetStatsSummaryRequest) returns (GetStatsSummaryResponse);
  rpc ListDepartments(ListDepartmentsRequest) returns (ListDepartmentsResponse);
  rpc GetTopEmployees(GetTopEmployeesRequest) returns (GetTopEmployeesResponse);
  rpc GetStatsByUnitTypes(GetStatsByUnitTypesRequest) returns (GetStatsByUnitTypesResponse);
  rpc GetStatsCalendar(GetStatsCalendarRequest) returns (GetStatsCalendarResponse);
  rpc SearchTasks(SearchTasksRequest) returns (SearchTasksResponse);
  rpc GetTaskLink(GetTaskLinkRequest) returns (GetTaskLinkResponse);

  // Голосовые операции (alicesvc, навык Алисы): действия от имени конкретного
  // пользователя (user_id) в его активной компании (company_id).
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc CloseTask(CloseTaskRequest) returns (CloseTaskResponse);
  rpc ListOpenTasks(ListOpenTasksRequest) returns (ListOpenTasksResponse);
  rpc ListAllDepartments(ListAllDepartmentsRequest) returns (ListAllDepartmentsResponse);
  rpc ListUnitTypes(ListUnitTypesRequest) returns (ListUnitTypesResponse);
  rpc StartUnit(StartUnitRequest) returns (StartUnitResponse);
  rpc StopActiveUnit(StopActiveUnitRequest) returns (StopActiveUnitResponse);
  rpc GetActiveUnit(GetActiveUnitRequest) returns (GetActiveUnitResponse);
}

message Error {
  string code = 1;
  string message = 2;
  int32 http_status = 3;
}

// period — человекочитаемый код окна статистики: today/yesterday/
// this_week/last_week/this_month/last_month/7d/30d (МСК-сутки). Пустая
// строка/незнакомый код — this_week.

message GetStatsSummaryRequest {
  int64 company_id = 1;
  string period = 2;
}

message GetStatsSummaryResponse {
  Error error = 1;
  int32 new_count = 2;
  int32 closed_count = 3;
  int32 in_progress_count = 4;
  int32 debt_count = 5;
  double total_hours = 6;
  string period_label = 7;
}

message ListDepartmentsRequest {
  int64 company_id = 1;
  string period = 2;
}

message DepartmentStat {
  int64 id = 1;
  string name = 2;
  int32 new_count = 3;
}

message ListDepartmentsResponse {
  Error error = 1;
  repeated DepartmentStat departments = 2;
  string period_label = 3;
}

message GetTopEmployeesRequest {
  int64 company_id = 1;
  string period = 2;
  int32 limit = 3; // 0 → дефолт 10, максимум 30.
}

message EmployeeStat {
  string fio = 1;
  int32 task_count = 2;
  double hours = 3;
}

message GetTopEmployeesResponse {
  Error error = 1;
  repeated EmployeeStat employees = 2;
  string period_label = 3;
}

message GetStatsByUnitTypesRequest {
  int64 company_id = 1;
  string period = 2;
}

message UnitTypeStat {
  string unit_type_name = 1;
  double hours = 2;
  int32 task_count = 3;
}

message GetStatsByUnitTypesResponse {
  Error error = 1;
  repeated UnitTypeStat unit_types = 2;
  string period_label = 3;
}

message GetStatsCalendarRequest {
  int64 company_id = 1;
  string period = 2;
}

message CalendarDayStat {
  string date = 1;
  int32 new_count = 2;
  int32 closed_count = 3;
  double hours = 4;
}

message GetStatsCalendarResponse {
  Error error = 1;
  repeated CalendarDayStat days = 2;
  string period_label = 3;
}

message SearchTasksRequest {
  int64 company_id = 1;
  string query = 2;
  int32 limit = 3; // 0 → дефолт 10.
}

// TaskRef — минимум для ссылки в ответе ассистента. color — личный цвет
// задачи (per-user), у безличного gRPC-вызова его нет — всегда "".
message TaskRef {
  int64 id = 1;
  string name = 2;
  string color = 3;
}

message SearchTasksResponse {
  Error error = 1;
  repeated TaskRef tasks = 2;
}

message GetTaskLinkRequest {
  int64 company_id = 1;
  int64 task_id = 2;
}

// --- Голосовые операции ---

// CatalogItem — элемент справочника компании (отдел, тип юнита).
message CatalogItem {
  int64 id = 1;
  string name = 2;
}

message CreateTaskRequest {
  int64 company_id = 1;
  int64 user_id = 2; // автор задачи
  string name = 3;
  int64 department_id = 4; // 0 — автовыбор: единственный отдел компании
}

message CreateTaskResponse {
  Error error = 1; // DEPARTMENT_REQUIRED — отделов несколько, нужен явный выбор
  int64 id = 2;
  string name = 3;
}

message CloseTaskRequest {
  int64 company_id = 1;
  int64 user_id = 2; // актор (для геймификации/YouGile-пуша)
  int64 task_id = 3;
}

message CloseTaskResponse {
  Error error = 1;
  string name = 2;
}

message ListOpenTasksRequest {
  int64 company_id = 1;
  int64 user_id = 2;
  bool only_mine = 3; // только где пользователь ответственный
  int32 limit = 4;    // 0 → дефолт 5
}

message ListOpenTasksResponse {
  Error error = 1;
  repeated TaskRef tasks = 2;
  int32 total = 3;
}

message ListAllDepartmentsRequest {
  int64 company_id = 1;
}

message ListAllDepartmentsResponse {
  Error error = 1;
  repeated CatalogItem departments = 2;
}

message ListUnitTypesRequest {
  int64 company_id = 1;
}

message ListUnitTypesResponse {
  Error error = 1;
  repeated CatalogItem unit_types = 2;
}

message StartUnitRequest {
  int64 company_id = 1;
  int64 user_id = 2;
  int64 task_id = 3;
  int64 unit_type_id = 4; // 0 — автовыбор: единственный тип юнита компании
  string name = 5;        // пусто — имя задачи
}

message StartUnitResponse {
  Error error = 1; // UNIT_TYPE_REQUIRED — типов несколько, нужен явный выбор
  int64 unit_id = 2;
  string task_name = 3;
}

message StopActiveUnitRequest {
  int64 user_id = 1;
}

message StopActiveUnitResponse {
  Error error = 1; // NO_ACTIVE_UNIT — активного юнита нет
  string unit_name = 2;
  string task_name = 3;
  int32 minutes = 4; // длительность завершённого юнита
}

message GetActiveUnitRequest {
  int64 user_id = 1;
}

message GetActiveUnitResponse {
  Error error = 1;
  bool active = 2; // false — активного юнита нет (это не ошибка)
  int64 unit_id = 3;
  int64 task_id = 4;
  string unit_name = 5;
  string task_name = 6;
  int32 minutes = 7; // сколько уже идёт
}

message GetTaskLinkResponse {
  Error error = 1; // NOT_FOUND — задачи нет либо она не в этой компании.
  int64 id = 2;
  string name = 3;
  string color = 4;
  string responsible_fio = 5; // "" — ответственный не назначен.
}
