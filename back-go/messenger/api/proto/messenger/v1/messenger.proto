syntax = "proto3";

// Контракт мессенджера: вызовы Flask (и в будущем groovesvc) → msgsvc.
// Транспорт всегда OK; бизнес-ошибка — в поле error.
// message_json — готовый снапшот сообщения в форме REST-ответа
// (эмитится в Socket.IO без чтения БД на стороне вызывающего).
package messenger.v1;

option go_package = "github.com/DmitriyODS/gw2/back-go/pkg/gen/messengerpb;messengerpb";

service MessengerService {
  // Парный диалог (создаётся ДО StartCall, если его ещё нет).
  rpc EnsureDialog(EnsureDialogRequest) returns (EnsureDialogResponse);
  // Системная плашка звонка kind='call' в парном диалоге.
  rpc CreateCallMessage(CreateCallMessageRequest) returns (CreateCallMessageResponse);
  // Актуальный снапшот плашки звонка — для message:updated при смене статуса.
  rpc GetCallMessage(GetCallMessageRequest) returns (GetCallMessageResponse);
  // Бот-сообщение Грувика (sender NULL + is_bot) в pet-чат; msgsvc сам публикует message:new.
  rpc PostBotMessage(PostBotMessageRequest) returns (PostBotMessageResponse);
  // Последние сообщения диалога — контекст для AI-ответа pet-чата.
  rpc ListRecentMessages(ListRecentMessagesRequest) returns (ListRecentMessagesResponse);
}

message Error {
  string code = 1;
  string message = 2;
  int32 http_status = 3;
}

message EnsureDialogRequest {
  int64 user_a_id = 1;
  int64 user_b_id = 2;
}

message EnsureDialogResponse {
  Error error = 1;
  int64 conversation_id = 2;
}

message CreateCallMessageRequest {
  int64 conversation_id = 1;
  int64 sender_id = 2;
  int64 call_id = 3;
}

message CreateCallMessageResponse {
  Error error = 1;
  string message_json = 2;
  repeated int64 notify_user_ids = 3;
}

message GetCallMessageRequest {
  int64 call_id = 1;
}

message GetCallMessageResponse {
  Error error = 1;
  int64 conversation_id = 2;
  string message_json = 3;
  repeated int64 notify_user_ids = 4;
}

message PostBotMessageRequest {
  int64 conversation_id = 1;
  string text = 2;
}

message PostBotMessageResponse {
  Error error = 1;
  int64 message_id = 2;
}

message ChatMessage {
  int64 id = 1;
  bool is_bot = 2;
  // 0 — системное/бот-сообщение (sender NULL).
  int64 sender_id = 3;
  string text = 4;
  // RFC3339.
  string created_at = 5;
}

message ListRecentMessagesRequest {
  int64 conversation_id = 1;
  int32 limit = 2;
}

message ListRecentMessagesResponse {
  Error error = 1;
  // В хронологическом порядке (старые → новые).
  repeated ChatMessage messages = 2;
}
