version: v2
modules:
  - path: api/proto
lint:
  use:
    - STANDARD
  except:
    # RPC — императивные хуки On*; ответ у всех общий (HookResponse),
    # запросы названы по событию, а не по RPC.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
