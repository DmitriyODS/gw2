apply plugin: 'com.android.application'

// Номер сборки (ГГММДДН) — из apps/mobile/version.json (канал раздачи нового
// мобильного приложения, зеркало apps/desktop/); тот же файл сервер отдаёт
// клиенту для проверки обновлений. Имя версии продукта — data/changelog.json
// (первая запись), единый источник истины с веб-фронтом.
def appBuildNumber = {
    def m = (rootProject.file('../../apps/mobile/version.json').text =~ /"current_build"\s*:\s*(\d+)/)
    m.find() ? m.group(1).toInteger() : 1
}()
def appVersionName = {
    def m = (rootProject.file('../../data/changelog.json').text =~ /"version"\s*:\s*"([^"]+)"/)
    m.find() ? m.group(1) : '1.0'
}()

// Подпись релиза: ТОТ ЖЕ ключ, что у прежнего нативного приложения
// (groovework-release.jks) — только так APK встаёт обновлением поверх
// существующих установок. Секреты — keystore.properties (gitignored,
// шаблон keystore.properties.example).
def keystorePropsFile = rootProject.file('keystore.properties')
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystorePropsFile.withInputStream { keystoreProps.load(it) }
}

android {
    namespace "com.kodass.groovework"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.kodass.groovework"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appBuildNumber
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (keystorePropsFile.exists()) {
            release {
                storeFile rootProject.file(keystoreProps.getProperty('storeFile'))
                storePassword keystoreProps.getProperty('storePassword')
                keyAlias keystoreProps.getProperty('keyAlias')
                keyPassword keystoreProps.getProperty('keyPassword')
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (keystorePropsFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    // PushMessagingService наследует сервис плагина push-notifications и
    // работает с RemoteMessage напрямую — FCM нужен на compile classpath
    // приложения (версия — как у плагина).
    implementation "com.google.firebase:firebase-messaging:24.1.0"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
