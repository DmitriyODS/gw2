<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Groove Work</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, sans-serif; background: #1a1c1e; color: #e3e2e6; text-align: center;
    }
    .box { padding: 32px; max-width: 420px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 14px; opacity: .8; margin: 0 0 24px; line-height: 1.45; }
    button {
      padding: 12px 28px; border: 0; border-radius: 999px; font-size: 15px; font-weight: 600;
      background: #a8c8ff; color: #0a305f; cursor: pointer;
    }
    .hint { font-size: 12.5px; opacity: .55; margin-top: 16px; }
    .spin {
      display: inline-block; width: 12px; height: 12px; margin-right: 6px; vertical-align: -1px;
      border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%;
      animation: r 0.9s linear infinite;
    }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <h1>Нет соединения с сервером</h1>
    <p>Groove Work не смог загрузиться. Проверьте интернет — приложение
       подключится само, как только сеть появится.</p>
    <button id="retry">Повторить</button>
    <p class="hint"><span class="spin"></span>Повторяем подключение автоматически…</p>
  </div>
  <script>
    // Авто-восстановление первого запуска: холодный старт без сети/DNS раньше
    // оставлял пользователя на этой странице навсегда (или на пустом WebView) —
    // теперь повторяем сами с бэкоффом 2с→15с. Задержка переживает перезагрузку
    // страницы (каждая неудача снова открывает error.html) через sessionStorage.
    var APP_URL = 'https://gw.kodass.ru'
    var delay = Math.min(Number(sessionStorage.getItem('gw_retry_delay')) || 2000, 15000)
    sessionStorage.setItem('gw_retry_delay', String(Math.min(delay * 2, 15000)))

    var btn = document.getElementById('retry')

    // Навигация вслепую при мёртвой сети оставляла голый белый WebView (эту
    // страницу уже сменила пустая ошибка навигации, отката назад нет). Поэтому
    // сначала проверяем достижимость сервера лёгким запросом и уходим с этой
    // страницы только когда он реально ответил.
    function probe() {
      return new Promise(function (resolve) {
        var ctrl = window.AbortController ? new AbortController() : null
        var t = setTimeout(function () {
          if (ctrl) ctrl.abort()
          resolve(false)
        }, 5000)
        fetch(APP_URL + '/api/changelog', { mode: 'no-cors', cache: 'no-store', signal: ctrl && ctrl.signal })
          .then(function () { clearTimeout(t); resolve(true) })
          .catch(function () { clearTimeout(t); resolve(false) })
      })
    }

    var checking = false
    function tryConnect(manual) {
      if (checking) return
      checking = true
      if (manual) btn.textContent = 'Проверяем…'
      probe().then(function (alive) {
        if (alive) {
          sessionStorage.removeItem('gw_retry_delay')
          location.replace(APP_URL)
          return
        }
        checking = false
        if (manual) btn.textContent = 'Повторить'
      })
    }

    function schedule() {
      setTimeout(function () {
        schedule()
        // Сеть точно отсутствует — не дёргаем даже пробу, ждём события online.
        if (navigator.onLine === false) return
        tryConnect(false)
      }, delay)
    }

    btn.addEventListener('click', function () { tryConnect(true) })
    window.addEventListener('online', function () { tryConnect(false) })
    schedule()
  </script>
</body>
</html>
